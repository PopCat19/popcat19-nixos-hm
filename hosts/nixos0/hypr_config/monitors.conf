# nixos0 Desktop monitor configuration
# Optimized for dual-monitor desktop setup
# See https://wiki.hyprland.org/Configuring/Monitors/

# Primary monitor: DP-3 (1920x1080@165Hz) - Main display
monitor=DP-3, 1920x1080@165.00, 0x0, 1

# Secondary monitor: HDMI-A-1 (1920x1080@60Hz) - Portrait mode, positioned to the right
monitor=HDMI-A-1, 1920x1080@60.00, 1920x-560, 1, transform, 1

# Additional monitor support for future expansion
monitor=DP-1, preferred, auto, 1
monitor=DP-2, preferred, auto, 1
monitor=HDMI-A-2, preferred, auto, 1

# USB-C/Thunderbolt monitor support
monitor=USB-C-1, preferred, auto, 1
monitor=eDP-1, preferred, auto, 1

# Fallback configuration for automatic detection
monitor=,preferred,auto,auto

# Desktop-specific display settings
# High refresh rate optimization for gaming
monitor=DP-3, addreserved, 0, 0, 0, 0
monitor=HDMI-A-1, addreserved, 0, 0, 0, 0

# No workspace assignments - let Hyprland handle workspace distribution automatically