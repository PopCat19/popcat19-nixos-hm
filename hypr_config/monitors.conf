# Generic/Default Monitor Configuration
# See https://wiki.hyprland.org/Configuring/Monitors/
# This serves as a fallback configuration - host-specific configs should override

# Generic monitor configuration - automatic detection for all displays
# This will work with most common setups and can be overridden by host-specific configs
monitor=,preferred,auto,auto

# Common monitor configurations (commented out - enable as needed)
# Desktop monitors
# monitor=DP-1, preferred, auto, 1
# monitor=DP-2, preferred, auto, 1
# monitor=DP-3, preferred, auto, 1
# monitor=HDMI-A-1, preferred, auto, 1
# monitor=HDMI-A-2, preferred, auto, 1

# Laptop/integrated displays
# monitor=eDP-1, preferred, auto, 1

# USB-C/Thunderbolt displays
# monitor=USB-C-1, preferred, auto, 1

# Generic display settings
# monitor=,addreserved, 0, 0, 0, 0
