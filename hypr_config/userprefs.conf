# ~/.config/hypr/userprefs.conf - Generic/Default Configuration
# █░█ █▀ █▀▀ █▀█   █▀█ █▀█ █▀▀ █▀▀ █▀
# █▄█ ▄█ ██▄ █▀▄   █▀▀ █▀▄ ██▄ █▀░ ▄█

# Generic Hyprland user preferences - serves as fallback/default configuration
# Host-specific configurations should override these settings as needed

# Generic input configuration
input {
    kb_layout = us
    follow_mouse = 1
    mouse_refocus = true
    accel_profile = flat
    sensitivity = 1.0
    force_no_accel = 1
    scroll_factor = 0.3
    numlock_by_default = true
    touchpad {
        scroll_factor = 0.3
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# hyprshade / blue-filter (universal)
exec = hyprshade on blue-light-filter
bind = Alt+Super,N,exec,hyprshade toggle blue-light-filter
bind = Alt+Super,M,exec,hyprshade toggle cool-stuff
bind = Alt+Super,B,exec,hyprshade toggle extradark

# Generic display power management
bind = Alt+Super,J,exec,hyprctl dispatch dpms toggle

